<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login - VTELECTRICKON</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f4f6f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); width: 380px; overflow: hidden; }
    .login-header { background: linear-gradient(135deg, #0f172a, #1e3a5f); padding: 32px; text-align: center; color: #fff; }
    .login-header .brand { font-size: 1.3rem; font-weight: 700; }
    .login-header .brand span { color: #f59e0b; }
    .login-body { padding: 32px; background: #fff; }
    .form-control { border-radius: 8px; border: 1.5px solid #e2e8f0; padding: 10px 14px; font-size: 0.95rem; }
    .form-control:focus { border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15,23,42,0.08); }
    .btn-login { background: #0f172a; color: #fff; border: none; border-radius: 8px; padding: 12px; font-weight: 600; width: 100%; font-size: 0.95rem; }
    .btn-login:hover { background: #1e3a5f; color: #fff; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    <div class="brand">⚡ VT<span>ELECTRICKON</span></div>
    <div class="mt-1" style="color:#94a3b8; font-size:0.85rem;">Admin Access Only</div>
  </div>
  <div class="login-body">
    {% if error %}
    <div class="alert alert-danger py-2 mb-3" style="border-radius:8px; font-size:0.875rem;">
      <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
    </div>
    {% endif %}
    <form method="POST">
      <div class="mb-4">
        <label class="form-label fw-semibold" style="font-size:0.875rem;">Password</label>
        <input type="password" class="form-control" name="password" placeholder="Enter admin password" autofocus required>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-lock-fill me-2"></i>Login
      </button>
    </form>
    <div class="text-center mt-4">
      <a href="/" style="color:#64748b; font-size:0.85rem; text-decoration:none;">
        <i class="bi bi-arrow-left me-1"></i>Back to Store
      </a>
    </div>
  </div>
</div>

</body>
</html>
