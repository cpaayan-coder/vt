<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout - VTELECTRICKON</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f4f6f9; }
    .navbar-brand span { color: #f59e0b; }
    .checkout-card { background: #fff; border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); padding: 28px; }
    .form-control, .form-select { border-radius: 8px; border: 1.5px solid #e2e8f0; padding: 10px 14px; font-size: 0.95rem; }
    .form-control:focus { border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15,23,42,0.08); }
    .payment-option { border: 2px solid #e2e8f0; border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.2s; margin-bottom: 0; }
    .payment-option:hover { border-color: #0f172a; background: #f8fafc; }
    .payment-option.selected { border-color: #0f172a; background: #f0f4ff; }
    .payment-option .icon { font-size: 1.6rem; margin-right: 12px; }
    .upi-box { background: #f0fdf4; border: 2px dashed #86efac; border-radius: 10px; padding: 18px; display: none; }
    .upi-id { font-size: 1.2rem; font-weight: 700; color: #15803d; letter-spacing: 0.5px; }
    .summary-box { background: #0f172a; color: #fff; border-radius: 12px; padding: 24px; }
    .summary-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.9rem; border-bottom: 1px solid #1e293b; }
    .summary-item:last-child { border-bottom: none; }
    .btn-place { background: #f59e0b; color: #0f172a; border: none; border-radius: 8px; padding: 13px; font-weight: 700; font-size: 1rem; width: 100%; }
    .btn-place:hover { background: #d97706; color: #0f172a; }
    footer { background: #0f172a; color: #94a3b8; padding: 24px 0; margin-top: 60px; font-size: 0.875rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark" style="background:#0f172a;">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4" href="/">⚡ VT<span>ELECTRICKON</span></a>
    <a href="/cart" class="btn btn-outline-light btn-sm"><i class="bi bi-cart3 me-1"></i>Cart</a>
  </div>
</nav>

<div class="container py-5">
  <h4 class="fw-bold mb-4"><i class="bi bi-bag-check me-2"></i>Checkout</h4>

  {% if error %}
  <div class="alert alert-danger" style="border-radius:10px;">
    <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
  </div>
  {% endif %}

  <form method="POST" id="checkout-form">
    <div class="row g-4">
      <!-- Left: Details + Payment -->
      <div class="col-lg-7">

        <!-- Delivery Details -->
        <div class="checkout-card mb-4">
          <h6 class="fw-bold mb-3">Delivery Details</h6>
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:0.875rem;">Full Name</label>
            <input type="text" class="form-control" name="name" placeholder="Your full name" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:0.875rem;">Phone Number</label>
            <input type="tel" class="form-control" name="phone" placeholder="+91 XXXXX XXXXX" required>
          </div>
          <div class="mb-0">
            <label class="form-label fw-semibold" style="font-size:0.875rem;">Delivery Address</label>
            <textarea class="form-control" name="address" rows="3" placeholder="House/Flat No., Street, City, State, PIN Code" required></textarea>
          </div>
        </div>

        <!-- Payment Method -->
        <div class="checkout-card">
          <h6 class="fw-bold mb-3">Payment Method</h6>
          <div class="d-flex flex-column gap-3">

            <!-- Cash on Delivery -->
            <label class="d-flex align-items-center payment-option selected" id="label-cod" style="cursor:pointer;">
              <input type="radio" name="payment_method" value="cod" class="d-none" checked onchange="selectMethod('cod')">
              <span class="icon">🚚</span>
              <div>
                <div class="fw-semibold">Cash on Delivery</div>
                <div class="text-muted" style="font-size:0.8rem;">Pay cash when your order arrives</div>
              </div>
            </label>

            <!-- Online Payment (Razorpay) -->
            <label class="d-flex align-items-center payment-option" id="label-online" style="cursor:pointer;">
              <input type="radio" name="payment_method" value="online" class="d-none" onchange="selectMethod('online')">
              <span class="icon">💳</span>
              <div>
                <div class="fw-semibold">Online Payment (Razorpay)</div>
                <div class="text-muted" style="font-size:0.8rem;">Pay instantly via UPI, Credit/Debit Card, or NetBanking</div>
              </div>
            </label>

          </div>

        </div>
      </div>

      <!-- Right: Order Summary -->
      <div class="col-lg-5">
        <div class="summary-box">
          <div class="fw-semibold mb-3" style="text-transform:uppercase;letter-spacing:0.5px;font-size:0.8rem;color:#94a3b8;">Order Summary</div>
          {% for p in products %}
          <div class="summary-item">
            <span>{{ p[1] }}</span>
            <span>₹{{ "%.0f"|format(p[3]) }}</span>
          </div>
          {% endfor %}
          <div class="d-flex justify-content-between fw-bold mt-3" style="font-size:1.1rem;">
            <span>Total</span>
            <span style="color:#f59e0b;">₹{{ "%.0f"|format(total) }}</span>
          </div>
          <button type="submit" class="btn-place mt-4">
            <i class="bi bi-lock-fill me-2"></i>Place Order
          </button>
          <a href="/cart" class="btn w-100 mt-2" style="background:transparent;color:#94a3b8;border:1px solid #334155;border-radius:8px;">
            Back to Cart
          </a>
        </div>
      </div>

    </div>
  </form>
</div>

<footer class="text-center">
  <div class="container">
    <div class="fw-semibold text-white mb-1">⚡ VTELECTRICKON</div>
    <div>Your trusted electronics partner &mdash; &copy; 2025</div>
  </div>
</footer>

<script>
  function selectMethod(method) {
    ['cod', 'online'].forEach(m => {
      let el = document.getElementById('label-' + m);
      if (el) el.classList.remove('selected');
    });
    document.getElementById('label-' + method).classList.add('selected');
  }
</script>
</body>
</html>
